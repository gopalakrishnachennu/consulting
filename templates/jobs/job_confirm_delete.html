{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center py-12">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Delete job?</h2>
        <p class="text-gray-600 text-sm mb-6">
            Are you sure you want to delete "<strong>{{ job.title }}</strong>"? This cannot be undone.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <a href="{% url 'job-detail' job.pk %}" class="px-4 py-2.5 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition">Cancel</a>
                <button type="submit" class="px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition">Confirm delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
