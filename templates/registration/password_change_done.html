{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center py-12">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 w-full max-w-md text-center">
        <div class="mb-4">
            <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-green-100 text-green-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </span>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Password changed</h2>
        <p class="text-gray-600 mb-6 text-sm">Your password has been updated successfully.</p>
        <a href="{% url 'home' %}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg transition">Go to Home</a>
    </div>
</div>
{% endblock %}
