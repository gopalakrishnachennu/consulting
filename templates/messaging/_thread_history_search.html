<div class="shrink-0 border-b border-gray-200 bg-white px-3 py-2 sm:px-4 {% if is_pane %}{% endif %}">
    <form method="get" action="{% if is_pane %}{% url 'inbox' %}{% else %}{% url 'thread-detail' thread.pk %}{% endif %}" class="mx-auto flex max-w-4xl flex-wrap items-center gap-2">
        {% if is_pane %}
        <input type="hidden" name="thread" value="{{ thread.pk }}" />
        {% if request.GET.list_q %}
        <input type="hidden" name="list_q" value="{{ request.GET.list_q }}" />
        {% endif %}
        {% endif %}
        <label for="messaging-history-q" class="sr-only">Search in conversation</label>
        <div class="flex min-h-[2.5rem] min-w-0 flex-1 items-center gap-2 rounded-full border border-gray-200 bg-gray-100 px-3 py-1">
            <svg width="16" height="16" class="shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input id="messaging-history-q" type="text" name="history_q" value="{{ messages_history_q }}" inputmode="search" autocomplete="off"
                placeholder="Search in conversation"
                class="min-w-0 flex-1 border-0 bg-transparent py-1.5 text-sm text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-0" />
        </div>
        {% if messages_history_q %}
        <a href="{% if is_pane %}{% url 'inbox' %}?thread={{ thread.pk }}{% if request.GET.list_q %}&list_q={{ request.GET.list_q|urlencode }}{% endif %}{% else %}{% url 'thread-detail' thread.pk %}{% endif %}" class="rounded-full px-3 py-1.5 text-xs font-semibold text-gray-500 hover:bg-gray-100">Clear</a>
        {% endif %}
        <button type="submit" class="rounded-full bg-gray-200 px-4 py-2 text-xs font-bold text-gray-800 transition hover:bg-gray-300">Search</button>
    </form>
</div>
