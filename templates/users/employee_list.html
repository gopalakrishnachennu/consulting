{% extends 'base.html' %}

{% block content %}
<!-- ═══════ HERO HEADER (aligned with Jobs/Consultants) ═══════ -->
<div class="hero-gradient rounded-2xl px-8 py-8 mb-6 relative overflow-hidden animate-fade-in-up">
    <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <a href="{% url 'admin-dashboard' %}"
                    class="text-blue-200 hover:text-white text-sm font-medium transition">← Dashboard</a>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight flex items-center gap-4">
                <svg class="w-9 h-9 text-blue-100 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M16 14a4 4 0 10-8 0v4a2 2 0 01-2 2h12a2 2 0 01-2-2v-4zM12 4a3 3 0 110 6 3 3 0 010-6z" />
                </svg>
                Manage Employees
                <span class="bg-white/20 text-white text-sm font-semibold px-3 py-1 rounded-full backdrop-blur-sm">
                    {{ page_obj.paginator.count|default:0 }}
                </span>
            </h1>
            <p class="text-blue-100 mt-2 text-base md:text-lg">
                View, search, and manage your internal team.
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center gap-3">
            <a href="{% url 'employee-export-csv' %}?{{ request.GET.urlencode }}"
                class="px-4 py-2.5 bg-white/15 border border-white/30 rounded-xl text-sm font-medium text-white hover:bg-white/25 transition backdrop-blur-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Export CSV
            </a>
            <a href="{% url 'employee-add' %}"
                class="bg-white text-indigo-700 font-bold py-2.5 px-6 rounded-xl shadow-lg hover:shadow-xl transition flex items-center gap-2 btn-glow">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Add Employee
            </a>
        </div>
    </div>
</div>

<!-- ═══════ FILTER BAR (compact) ═══════ -->
<div class="glass rounded-2xl px-5 py-3 mb-3 animate-slide-up" style="animation-delay:.05s">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="relative flex-grow w-full md:w-auto">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </span>
            <input type="text" name="search" placeholder="Search by name, email, department…"
                class="w-full pl-11 pr-4 py-3 bg-white/80 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition"
                value="{{ request.GET.search }}"
                hx-get="{% url 'employee-list' %}"
                hx-trigger="keyup changed delay:500ms"
                hx-target="#employee-list-results"
                hx-indicator="#loading-indicator"
                hx-push-url="true">
        </div>
    </div>
</div>

<!-- ═══════ LOADING INDICATOR ═══════ -->
<div id="loading-indicator" class="htmx-indicator flex justify-center py-3">
    <div class="flex items-center gap-3">
        <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-200 border-t-indigo-600"></div>
        <span class="text-sm text-gray-500 font-medium">Loading employees…</span>
    </div>
</div>

<!-- ═══════ RESULTS ═══════ -->
<div id="employee-list-results">
    {% include 'users/_employee_list_partial.html' %}
</div>
{% endblock %}
