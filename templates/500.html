<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #1e293b; }
    .card { max-width: 28rem; text-align: center; padding: 3rem 2rem; }
    .code { font-size: 4rem; font-weight: 800; color: #cbd5e1; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #64748b; margin-bottom: 2rem; line-height: 1.5; }
    a { display: inline-block; padding: 0.75rem 1.5rem; background: #1e293b; color: #fff; border-radius: 0.5rem; text-decoration: none; font-weight: 600; font-size: 0.875rem; }
    a:hover { background: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <h1>Something went wrong</h1>
    <p>We've been notified and are working on it. Please try again in a few minutes.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
